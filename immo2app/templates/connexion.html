
{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <link rel="stylesheet" type="text/css" href="{% static 'immo2app/bootstrap-5.3.8-dist/css/inscon.css' %}">
    <style>
        /* Style pour les messages d'alerte */
        .alert-message {
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }
        
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-icon {
            font-size: 24px;
        }
        
        .alert-link {
            color: #0056b3;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
        }
        
        .alert-link:hover {
            text-decoration: underline;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>🔐 Connexion</h2>
        
        <!-- Affichage des messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert-message {% if message.tags == 'error' %}alert-error{% elif message.tags == 'success' %}alert-success{% endif %}">
                    <span class="alert-icon">
                        {% if message.tags == 'error' %}⚠️{% elif message.tags == 'success' %}✅{% endif %}
                    </span>
                    <span>{{ message }}</span>
                </div>
            {% endfor %}
        {% endif %}
        
        <!-- SVG avec animation de tracé -->
        <svg class="svg-icon" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="3" stroke="#3498db" stroke-width="2"/>
            <path d="M12 12c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" stroke="#3498db" stroke-width="2"/>
        </svg>
        
        <form method="POST" action="{% url 'connexion'%}">
           {% csrf_token %}
          
           <label>Nom d'utilisateur :</label><br>
          <input type="text" name="username" class="input-field" required><br>
          <label>Mot de passe :</label><br>
          <input type="password" name="password" class="input-field" required><br>
          <button class="btn-login" type="submit">Se connecter</button><br>
          <p>pas de compte ?  <a href="{% url 'inscription' %}"><strong>Créer un compte</strong></a></p>
          
      </form>
    </div>
</body>
</html>
