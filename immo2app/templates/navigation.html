{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid px-3">

        <!-- Logo + ACAIN -->
        <a class="navbar-brand d-flex align-items-center" href="{% url 'home' %}">
            <img src="{% static 'images/acain.png' %}" alt="Acain" class="rounded-circle me-2"
                 width="35" height="35" style="object-fit: cover;">
            <span class="fw-bold" style="font-size: 1.1rem;">ACAIN</span>
        </a>

        <!-- Barre de recherche -->
        <div class="search-container-center">
            <i class="bi bi-search search-icon"></i>
            <input class="search-input" type="search" id="search-input"
                   name="q" placeholder="Rechercher par quartier..." autocomplete="off">
        </div>

        <!-- Hamburger -->
        <button class="navbar-toggler hamburger-btn border-0 p-0 ms-2" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="hamburger-box">
                <span class="hamburger-inner"></span>
            </span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        <i class="bi bi-house-door-fill"></i> Accueil
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'liste_terrains' %}">
                        <i class="bi bi-geo-alt-fill"></i> Terrains
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'liste_maisons' %}">
                        <i class="bi bi-house-fill"></i> Maisons
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'liste_hotels' %}">
                        <i class="bi bi-building"></i> Hôtels
                    </a>
                </li>

                <!-- Locations avec sous-menu -->
                <li class="nav-item nav-dropdown" id="nav-locations">
                    <a class="nav-link nav-dropdown-toggle" href="#"
                       id="locationsToggle" role="button">
                        <i class="bi bi-key-fill"></i> Locations
                        <i class="bi bi-chevron-down nav-chevron"></i>
                    </a>
                    <ul class="nav-submenu" id="locationsSubmenu">
                        <li>
                            <a href="{% url 'liste_locations' %}">
                                <i class="bi bi-grid-fill"></i> Toutes les locations
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'liste_appartements' %}">
                                <i class="bi bi-houses-fill"></i> Appartements
                            </a>
                        </li>
                        <li>
                            <a href="{% url 'liste_chambres' %}">
                                <i class="bi bi-door-open-fill"></i> Chambres
                            </a>
                        </li>
                    </ul>
                </li>

                <li class="nav-item">
                    <a class="nav-link btn-add-nav" href="{% url 'ajouter_terrain' %}">
                        <i class="bi bi-plus-circle-fill"></i> Ajouter
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'connexion' %}">
                        <i class="bi bi-person-circle"></i>
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>

<script>
(function() {
    const toggle   = document.getElementById('locationsToggle');
    const submenu  = document.getElementById('locationsSubmenu');
    const dropdown = document.getElementById('nav-locations');
    const chevron  = toggle ? toggle.querySelector('.nav-chevron') : null;
    const navbar   = document.getElementById('navbarContent');

    if (!toggle || !submenu) return;

    function openMenu() {
        submenu.classList.add('open');
        if (chevron) chevron.style.transform = 'rotate(180deg)';
    }

    function closeMenu() {
        submenu.classList.remove('open');
        if (chevron) chevron.style.transform = 'rotate(0deg)';
    }

    function toggleMenu() {
        submenu.classList.contains('open') ? closeMenu() : openMenu();
    }

    // ── Clic sur "Locations" ───────────────────────────────
    toggle.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();  // empêche Bootstrap de recevoir le clic
        toggleMenu();
    });

    // ── Clic dans le sous-menu → ne ferme pas le navbar ───
    submenu.addEventListener('click', function(e) {
        e.stopPropagation();
    });

    // ── Intercepter l'événement Bootstrap "hide" du navbar ─
    // Bootstrap déclenche 'hide.bs.collapse' pour fermer le menu.
    // On l'annule si c'est causé par un clic dans notre dropdown.
    if (navbar) {
        navbar.addEventListener('hide.bs.collapse', function(e) {
            if (dropdown && dropdown.contains(document.activeElement)) {
                e.preventDefault();
                e.stopPropagation();
            }
        });
    }

    // ── Sur mobile : garder le navbar ouvert après clic Locations
    // Bootstrap utilise un listener sur 'click' en document pour fermer.
    // On repose le navbar ouvert si c'était notre toggle qui a cliqué.
    let clickedLocations = false;

    toggle.addEventListener('mousedown', function() {
        clickedLocations = true;
    });
    toggle.addEventListener('touchstart', function() {
        clickedLocations = true;
    }, { passive: true });

    document.addEventListener('click', function(e) {
        if (clickedLocations) {
            // Rouvrir le navbar si Bootstrap l'a fermé
            if (navbar && !navbar.classList.contains('show')) {
                const bsCollapse = bootstrap.Collapse.getOrCreateInstance(navbar, { toggle: false });
                bsCollapse.show();
            }
            clickedLocations = false;
            return;
        }
        // Clic en dehors du dropdown → ferme le sous-menu
        if (dropdown && !dropdown.contains(e.target)) {
            closeMenu();
        }
    });

    // ── Touche Échap → ferme le sous-menu ─────────────────
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeMenu();
    });
})();
</script>
